openapi: 3.1.0
info:
  title: arXiv Astro-Ph Digest API
  version: 1.0.0
servers:
  - url: https://arxiv-reader.onrender.com
paths:
  /health:
    get:
      operationId: health
      summary: Health check
      responses:
        "200":
          description: OK
  /astro-ph/new:
    get:
      operationId: getNewAstroPh
      summary: Get today's astro-ph new papers (from arXiv RSS)
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            type: integer
            default: 200
            minimum: 1
            maximum: 500
        - name: include_abstracts
          in: query
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: A list of papers
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:
                    type: string
                  source:
                    type: string
                  papers:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        title: { type: string }
                        authors:
                          type: array
                          items: { type: string }
                        abstract: { type: string }
                        link: { type: string }
  /astro-ph/papers:
    get:
      operationId: getPapersById
      summary: Fetch abstracts for selected arXiv papers
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paper metadata